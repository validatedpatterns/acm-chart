suite: Test openshift-gitops installation policy
templates:
  - templates/policies/ocp-gitops-policy.yaml
release:
  name: release-test
tests:
  - it: Should output default values
    values:
      - ./clusterselector_values.yaml
    asserts:
      - hasDocuments:
          count: 6

  - it: Should change the channel when specified (legacy test updated to use spokeGitops)
    values:
      - ./clusterselector_values.yaml
    set:
      acm:
        spokeGitops:
          channel: gitops-9.9.9
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.channel
          value: gitops-9.9.9

  - it: Should use spokeGitops channel when specified
    values:
      - ./clusterselector_values.yaml
    set:
      acm:
        spokeGitops:
          channel: gitops-2.0.0
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.channel
          value: gitops-2.0.0

  - it: Should use spokeGitops source when specified
    values:
      - ./clusterselector_values.yaml
    set:
      acm:
        spokeGitops:
          source: custom-operators
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.source
          value: custom-operators

  - it: Should use spokeGitops channel and source when both specified
    values:
      - ./clusterselector_values.yaml
    set:
      acm:
        spokeGitops:
          channel: gitops-2.1.0
          source: my-custom-catalog
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.channel
          value: gitops-2.1.0
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.source
          value: my-custom-catalog

  - it: Should prioritize spokeGitops over main gitops settings
    values:
      - ./clusterselector_values.yaml
    set:
      main:
        gitops:
          channel: gitops-fallback
      acm:
        spokeGitops:
          channel: gitops-priority
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.channel
          value: gitops-priority

  - it: Should have only the default Subscription healthcheck when no extra healthchecks are configured
    values:
      - ./clusterselector_values.yaml
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        lengthEqual:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks
          count: 1
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks[0].group
          value: operators.coreos.com
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks[0].kind
          value: Subscription

  - it: Should append a single extra resource healthcheck
    values:
      - ./clusterselector_values.yaml
    set:
      acm:
        extraResourceHealthChecks:
          - group: argoproj.io
            kind: Application
            check: |
              hs = {}
              hs.status = "Healthy"
              return hs
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        lengthEqual:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks
          count: 2
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks[0].group
          value: operators.coreos.com
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks[1].group
          value: argoproj.io
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks[1].kind
          value: Application

  - it: Should append multiple extra resource healthchecks
    values:
      - ./clusterselector_values.yaml
    set:
      acm:
        extraResourceHealthChecks:
          - group: argoproj.io
            kind: Application
            check: |
              hs = {}
              hs.status = "Healthy"
              return hs
          - group: batch
            kind: Job
            check: |
              hs = {}
              if obj.status.succeeded == 1 then
                hs.status = "Healthy"
              end
              return hs
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        lengthEqual:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks
          count: 3
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks[1].group
          value: argoproj.io
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks[2].group
          value: batch
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.resourceHealthChecks[2].kind
          value: Job
