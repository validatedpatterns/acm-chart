  - it: "acm-hub-ca: All three PlacementBindings should reference kind Placement (vault)"
    template: templates/policies/acm-hub-ca-policy.yaml
    set:
      global:
        repoURL: https://github.com/test/repo
        hubClusterDomain: "apps.hub.example.com"
        localClusterDomain: "apps.hub.example.com"
        secretStore:
          backend: "vault"
        pattern: "test-pattern"
      clusterGroup:
        isHubCluster: true
        managedClusterGroups:
          testRegion:
            name: region-one
            labels:
            - name: clusterGroup
              value: region-one
    asserts:
      - documentSelector:
          path: metadata.name
          value: region-one-acm-hub-ca-policy-placement-binding
        equal:
          path: placementRef.kind
          value: Placement
      - documentSelector:
          path: metadata.name
          value: region-one-acm-hub-ca-policy-placement-binding
        equal:
          path: placementRef.apiGroup
          value: cluster.open-cluster-management.io
      - documentSelector:
          path: metadata.name
          value: region-one-hub-argo-ca-gitops-policy-binding
        equal:
          path: placementRef.kind
          value: Placement
      - documentSelector:
          path: metadata.name
          value: region-one-hub-argo-ca-gitops-policy-binding
        equal:
          path: placementRef.apiGroup
          value: cluster.open-cluster-management.io

  - it: "acm-hub-ca: All three Placements should use correct apiVersion (vault)"
    template: templates/policies/acm-hub-ca-policy.yaml
    set:
      global:
        repoURL: https://github.com/test/repo
        hubClusterDomain: "apps.hub.example.com"
        localClusterDomain: "apps.hub.example.com"
        secretStore:
          backend: "vault"
        pattern: "test-pattern"
      clusterGroup:
        isHubCluster: true
        managedClusterGroups:
          testRegion:
            name: region-one
            labels:
            - name: clusterGroup
              value: region-one
    asserts:
      - documentSelector:
          path: metadata.name
          value: region-one-acm-hub-ca-policy-placement
        isKind:
          of: Placement
      - documentSelector:
          path: metadata.name
          value: region-one-acm-hub-ca-policy-placement
        isAPIVersion:
          of: cluster.open-cluster-management.io/v1beta1
      - documentSelector:
          path: metadata.name
          value: region-one-acm-hub-ca-policy-placement
        isNull:
          path: spec.clusterConditions
      - documentSelector:
          path: metadata.name
          value: region-one-hub-argo-ca-gitops-policy-placement
        isKind:
          of: Placement
      - documentSelector:
          path: metadata.name
          value: region-one-hub-argo-ca-gitops-policy-placement
        isAPIVersion:
          of: cluster.open-cluster-management.io/v1beta1
      - documentSelector:
          path: metadata.name
          value: region-one-hub-argo-ca-gitops-policy-placement
        isNull:
          path: spec.clusterConditions

  - it: "acm-hub-ca: Placement predicates should have correct clusterSelector structure"
    template: templates/policies/acm-hub-ca-policy.yaml
    set:
      global:
        repoURL: https://github.com/test/repo
