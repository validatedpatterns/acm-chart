  - it: "private-repo: Hub Placement should use predicates with local-cluster selector"
    template: templates/policies/private-repo-policies.yaml
    set:
      global:
        repoURL: https://github.com/test/repo
        hubClusterDomain: "apps.hub.example.com"
        localClusterDomain: "apps.hub.example.com"
        privateRepo: true
        pattern: "test-pattern"
      clusterGroup:
        isHubCluster: true
