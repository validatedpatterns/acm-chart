suite: Test ocp-gitops-policy edge cases
templates:
  - templates/policies/ocp-gitops-policy.yaml
release:
  name: release-test
tests:
  - it: should set custom route TLS when argocdServer route tls is configured
    values:
      - ./clusterselector_values.yaml
    set:
      global:
        argocdServer:
          route:
            tls:
              insecureEdgeTerminationPolicy: Allow
              termination: passthrough
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.server.route.tls.insecureEdgeTerminationPolicy
          value: Allow
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.server.route.tls.termination
          value: passthrough

  - it: should not include route TLS block when argocdServer is not configured
    values:
      - ./clusterselector_values.yaml
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        isNull:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.server.route.tls

  - it: should use default TLS values when tls block has a key but no overrides
    values:
      - ./clusterselector_values.yaml
    set:
      global:
        argocdServer:
          route:
            tls:
              insecureEdgeTerminationPolicy: null
              termination: null
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.server.route.tls.insecureEdgeTerminationPolicy
          value: Redirect
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.server.route.tls.termination
          value: reencrypt

  - it: should not include route TLS block when tls is empty map
    values:
      - ./clusterselector_values.yaml
    set:
      global:
        argocdServer:
          route:
            tls: {}
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        isNull:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.server.route.tls

  - it: should render multiple groups each with their own set of resources
    set:
      clusterGroup:
        managedClusterGroups:
          groupOne:
            name: east
            acmlabels:
              - name: clusterGroup
                value: east
          groupTwo:
            name: west
            acmlabels:
              - name: clusterGroup
                value: west
    asserts:
      - hasDocuments:
          count: 12
      - documentSelector:
          path: metadata.name
          value: east-gitops-policy
        isKind:
          of: Policy
      - documentSelector:
          path: metadata.name
          value: west-gitops-policy
        isKind:
          of: Policy
      - documentSelector:
          path: metadata.name
          value: east-gitops-policy-argocd
        isKind:
          of: Policy
      - documentSelector:
          path: metadata.name
          value: west-gitops-policy-argocd
        isKind:
          of: Policy

  - it: should render server route as enabled
    values:
      - ./clusterselector_values.yaml
    asserts:
      - documentSelector:
          path: metadata.name
          value: group-one-gitops-policy-argocd
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.server.route.enabled
          value: true

  - it: should set default channel when neither spokeGitops nor main gitops is set
    set:
      acm:
        spokeGitops: null
      main:
        gitops:
          channel: null
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            acmlabels:
              - name: clusterGroup
                value: region-one
    asserts:
      - documentSelector:
          path: metadata.name
          value: region-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.channel
          value: gitops-1.20

  - it: should set default source when neither spokeGitops nor main gitops source is set
    set:
      acm:
        spokeGitops: null
      main:
        gitops:
          operatorSource: null
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            acmlabels:
              - name: clusterGroup
                value: region-one
    asserts:
      - documentSelector:
          path: metadata.name
          value: region-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.spec.source
          value: redhat-operators
