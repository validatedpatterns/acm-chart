suite: Test common secrets provisioning
templates:
  - templates/provision/secrets-common.yaml
release:
  name: release-test
tests:
  - it: should not render when no clusterPools or clusterDeployments defined
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 0

  - it: should render install-config pull-secret and ssh-key for AWS clusterPool
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: spoke
                openshiftVersion: "4.14.10"
                baseDomain: example.com
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 0
        isKind:
          of: Secret
      - documentIndex: 0
        equal:
          path: metadata.name
          value: spoke-region-one-install-config
      - documentIndex: 0
        isNull:
          path: metadata.namespace
      - documentIndex: 1
        isKind:
          of: ExternalSecret
      - documentIndex: 1
        equal:
          path: metadata.name
          value: spoke-region-one-pull-secret
      - documentIndex: 1
        isNull:
          path: metadata.namespace
      - documentIndex: 1
        equal:
          path: spec.target.template.type
          value: kubernetes.io/dockerconfigjson
      - documentIndex: 2
        isKind:
          of: ExternalSecret
      - documentIndex: 2
        equal:
          path: metadata.name
          value: spoke-region-one-ssh-private-key
      - documentIndex: 2
        isNull:
          path: metadata.namespace

  - it: should render namespaced secrets for clusterDeployment
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterDeployments:
              myCluster:
                name: cluster1
                baseDomain: example.com
                openshiftVersion: "4.14.10"
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 0
        equal:
          path: metadata.name
          value: cluster1-region-one-install-config
      - documentIndex: 0
        equal:
          path: metadata.namespace
          value: cluster1-region-one
      - documentIndex: 1
        equal:
          path: metadata.name
          value: cluster1-region-one-pull-secret
      - documentIndex: 1
        equal:
          path: metadata.namespace
          value: cluster1-region-one
      - documentIndex: 2
        equal:
          path: metadata.name
          value: cluster1-region-one-ssh-private-key
      - documentIndex: 2
        equal:
          path: metadata.namespace
          value: cluster1-region-one

  - it: should use custom pullSecretKeyPath when specified
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: spoke
                openshiftVersion: "4.14.10"
                baseDomain: example.com
                pullSecretKeyPath: secret/data/custom/pullsecret
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - documentIndex: 1
        equal:
          path: spec.data[0].remoteRef.key
          value: secret/data/custom/pullsecret

  - it: should use custom sshPrivateKeyPath when specified
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: spoke
                openshiftVersion: "4.14.10"
                baseDomain: example.com
                sshPrivateKeyPath: secret/data/custom/ssh
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - documentIndex: 2
        equal:
          path: spec.data[0].remoteRef.key
          value: secret/data/custom/ssh

  - it: should use correct secretStoreRef
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: spoke
                openshiftVersion: "4.14.10"
                baseDomain: example.com
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: my-secret-store
        kind: SecretStore
    asserts:
      - documentIndex: 1
        equal:
          path: spec.secretStoreRef.name
          value: my-secret-store
      - documentIndex: 1
        equal:
          path: spec.secretStoreRef.kind
          value: SecretStore
      - documentIndex: 2
        equal:
          path: spec.secretStoreRef.name
          value: my-secret-store

  - it: should render 6 documents when both clusterPool and clusterDeployment exist
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: pool1
                openshiftVersion: "4.14.10"
                baseDomain: example.com
                platform:
                  aws:
                    region: us-east-1
            clusterDeployments:
              myCluster:
                name: cluster1
                baseDomain: example.com
                openshiftVersion: "4.14.10"
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 6
