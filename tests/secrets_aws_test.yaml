suite: Test AWS secrets provisioning
templates:
  - templates/provision/secrets-aws.yaml
release:
  name: release-test
tests:
  - it: should not render when no AWS clusterPools or clusterDeployments defined
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render for Azure-only platform
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: spoke
                openshiftVersion: "4.14.10"
                baseDomain: azure.example.com
                platform:
                  azure:
                    baseDomainResourceGroupName: dns-zones
                    region: eastus
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 0

  - it: should render creds and infra-creds ExternalSecrets for AWS clusterPool
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: spoke
                openshiftVersion: "4.14.10"
                baseDomain: example.com
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        isKind:
          of: ExternalSecret
      - documentIndex: 0
        equal:
          path: metadata.name
          value: spoke-region-one-creds
      - documentIndex: 0
        isNull:
          path: metadata.namespace
      - documentIndex: 0
        equal:
          path: spec.secretStoreRef.name
          value: vault-backend
      - documentIndex: 0
        equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - documentIndex: 0
        equal:
          path: spec.dataFrom[0].extract.key
          value: secret/data/hub/aws
      - documentIndex: 1
        isKind:
          of: ExternalSecret
      - documentIndex: 1
        equal:
          path: metadata.name
          value: spoke-region-one-infra-creds
      - documentIndex: 1
        isNull:
          path: metadata.namespace

  - it: should render namespaced ExternalSecrets for AWS clusterDeployment
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterDeployments:
              myCluster:
                name: cluster1
                baseDomain: example.com
                openshiftVersion: "4.14.10"
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: metadata.name
          value: cluster1-region-one-creds
      - documentIndex: 0
        equal:
          path: metadata.namespace
          value: cluster1-region-one
      - documentIndex: 1
        equal:
          path: metadata.name
          value: cluster1-region-one-infra-creds
      - documentIndex: 1
        equal:
          path: metadata.namespace
          value: cluster1-region-one

  - it: should use custom awsKeyPath when specified
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: spoke
                openshiftVersion: "4.14.10"
                baseDomain: example.com
                awsKeyPath: secret/data/custom/aws-keys
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - documentIndex: 0
        equal:
          path: spec.dataFrom[0].extract.key
          value: secret/data/custom/aws-keys
      - documentIndex: 1
        equal:
          path: spec.data[1].remoteRef.key
          value: secret/data/custom/aws-keys
      - documentIndex: 1
        equal:
          path: spec.data[2].remoteRef.key
          value: secret/data/custom/aws-keys

  - it: should render infra-creds with correct data entries
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: spoke
                openshiftVersion: "4.14.10"
                baseDomain: example.com
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - documentIndex: 1
        lengthEqual:
          path: spec.data
          count: 5
      - documentIndex: 1
        equal:
          path: spec.data[0].secretKey
          value: openshiftPullSecret
      - documentIndex: 1
        equal:
          path: spec.data[1].secretKey
          value: awsKeyId
      - documentIndex: 1
        equal:
          path: spec.data[2].secretKey
          value: awsAccessKey
      - documentIndex: 1
        equal:
          path: spec.data[3].secretKey
          value: sshPublicKey
      - documentIndex: 1
        equal:
          path: spec.data[4].secretKey
          value: sshPrivateKey
      - documentIndex: 1
        equal:
          path: spec.target.template.metadata.labels["cluster.open-cluster-management.io/type"]
          value: aws
