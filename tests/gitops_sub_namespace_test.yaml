suite: Test gitOpsSubNamespace in gitops policy
templates:
  - templates/policies/ocp-gitops-policy.yaml
release:
  name: release-test
tests:
  - it: should default subscription namespace to openshift-operators when gitOpsSubNamespace is not set
    set:
      clusterGroup:
        managedClusterGroups:
          region-one:
            name: region-one
            acmlabels:
              - name: clusterGroup
                value: region-one
    asserts:
      - documentSelector:
          path: metadata.name
          value: region-one-gitops-policy
        isKind:
          of: Policy
      - documentSelector:
          path: metadata.name
          value: region-one-gitops-policy
        matchRegex:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.metadata.namespace
          pattern: ^openshift-operators$
      - documentSelector:
          path: metadata.name
          value: region-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.metadata.labels
          value:
            operators.coreos.com/openshift-gitops-operator.openshift-operators: ""

  - it: should default subscription namespace to openshift-operators when gitOpsSubNamespace is empty
    set:
      global:
        gitOpsSubNamespace: ""
      clusterGroup:
        managedClusterGroups:
          region-one:
            name: region-one
            acmlabels:
              - name: clusterGroup
                value: region-one
    asserts:
      - documentSelector:
          path: metadata.name
          value: region-one-gitops-policy
        matchRegex:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.metadata.namespace
          pattern: ^openshift-operators$
      - documentSelector:
          path: metadata.name
          value: region-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.metadata.labels
          value:
            operators.coreos.com/openshift-gitops-operator.openshift-operators: ""

  - it: should use gitOpsSubNamespace as subscription namespace when set
    set:
      global:
        gitOpsSubNamespace: my-gitops-ns
      clusterGroup:
        managedClusterGroups:
          region-one:
            name: region-one
            acmlabels:
              - name: clusterGroup
                value: region-one
    asserts:
      - documentSelector:
          path: metadata.name
          value: region-one-gitops-policy
        matchRegex:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.metadata.namespace
          pattern: ^my-gitops-ns$
      - documentSelector:
          path: metadata.name
          value: region-one-gitops-policy
        equal:
          path: spec.policy-templates[0].objectDefinition.spec.object-templates[0].objectDefinition.metadata.labels
          value:
            operators.coreos.com/openshift-gitops-operator.my-gitops-ns: ""
