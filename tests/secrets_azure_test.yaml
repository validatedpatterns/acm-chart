suite: Test Azure secrets provisioning
templates:
  - templates/provision/secrets-azure.yaml
release:
  name: release-test
tests:
  - it: should not render when no Azure clusterPools or clusterDeployments defined
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render for AWS-only platform
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: spoke
                openshiftVersion: "4.14.10"
                baseDomain: example.com
                platform:
                  aws:
                    region: us-east-1
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 0

  - it: should render creds and infra-creds ExternalSecrets for Azure clusterPool
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: azpool
                openshiftVersion: "4.15.2"
                baseDomain: azure.example.com
                platform:
                  azure:
                    baseDomainResourceGroupName: dns-zones
                    region: eastus
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        isKind:
          of: ExternalSecret
      - documentIndex: 0
        equal:
          path: metadata.name
          value: azpool-region-one-creds
      - documentIndex: 0
        isNull:
          path: metadata.namespace
      - documentIndex: 0
        equal:
          path: spec.data[0].secretKey
          value: azureOsServicePrincipal
      - documentIndex: 0
        equal:
          path: spec.data[0].remoteRef.key
          value: secret/data/hub/azureOsServicePrincipal
      - documentIndex: 0
        equal:
          path: spec.secretStoreRef.name
          value: vault-backend
      - documentIndex: 1
        isKind:
          of: ExternalSecret
      - documentIndex: 1
        equal:
          path: metadata.name
          value: azpool-region-one-infra-creds
      - documentIndex: 1
        isNull:
          path: metadata.namespace

  - it: should render namespaced ExternalSecrets for Azure clusterDeployment
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterDeployments:
              myCluster:
                name: azcluster
                baseDomain: azure.example.com
                openshiftVersion: "4.15.2"
                platform:
                  azure:
                    baseDomainResourceGroupName: dns-zones
                    region: eastus
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: metadata.name
          value: azcluster-region-one-creds
      - documentIndex: 0
        equal:
          path: metadata.namespace
          value: azcluster-region-one
      - documentIndex: 1
        equal:
          path: metadata.name
          value: azcluster-region-one-infra-creds
      - documentIndex: 1
        equal:
          path: metadata.namespace
          value: azcluster-region-one

  - it: should use custom azureKeyPath when specified
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: azpool
                openshiftVersion: "4.15.2"
                baseDomain: azure.example.com
                azureKeyPath: secret/data/custom/azure-creds
                platform:
                  azure:
                    baseDomainResourceGroupName: dns-zones
                    region: eastus
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - documentIndex: 0
        equal:
          path: spec.data[0].remoteRef.key
          value: secret/data/custom/azure-creds
      - documentIndex: 1
        equal:
          path: spec.data[3].remoteRef.key
          value: secret/data/custom/azure-creds

  - it: should render infra-creds with correct data entries and baseDomain
    set:
      clusterGroup:
        managedClusterGroups:
          testRegion:
            name: region-one
            clusterPools:
              testPool:
                name: azpool
                openshiftVersion: "4.15.2"
                baseDomain: azure.example.com
                platform:
                  azure:
                    baseDomainResourceGroupName: my-dns-zones
                    region: eastus
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - documentIndex: 1
        lengthEqual:
          path: spec.data
          count: 4
      - documentIndex: 1
        equal:
          path: spec.data[0].secretKey
          value: openshiftPullSecret
      - documentIndex: 1
        equal:
          path: spec.data[1].secretKey
          value: sshPublicKey
      - documentIndex: 1
        equal:
          path: spec.data[2].secretKey
          value: sshPrivateKey
      - documentIndex: 1
        equal:
          path: spec.data[3].secretKey
          value: azureOsServicePrincipal

  - it: should render secrets for multiple managedClusterGroups with Azure pools
    set:
      clusterGroup:
        managedClusterGroups:
          groupOne:
            name: east
            clusterPools:
              pool1:
                name: pool-east
                openshiftVersion: "4.15.2"
                baseDomain: east.azure.example.com
                platform:
                  azure:
                    baseDomainResourceGroupName: dns-zones-east
                    region: eastus
          groupTwo:
            name: west
            clusterPools:
              pool1:
                name: pool-west
                openshiftVersion: "4.15.2"
                baseDomain: west.azure.example.com
                platform:
                  azure:
                    baseDomainResourceGroupName: dns-zones-west
                    region: westus2
      secretStore:
        name: vault-backend
        kind: ClusterSecretStore
    asserts:
      - hasDocuments:
          count: 4
      - documentSelector:
          path: metadata.name
          value: pool-east-east-creds
        isKind:
          of: ExternalSecret
      - documentSelector:
          path: metadata.name
          value: pool-east-east-infra-creds
        isKind:
          of: ExternalSecret
      - documentSelector:
          path: metadata.name
          value: pool-west-west-creds
        isKind:
          of: ExternalSecret
      - documentSelector:
          path: metadata.name
          value: pool-west-west-infra-creds
        isKind:
          of: ExternalSecret
